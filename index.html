<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#05050a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PHONICS RESET</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Full-screen background canvas -->
<canvas id="bgCanvas"></canvas>

<!-- ==================== TITLE SCREEN ==================== -->
<div id="screen-title" class="screen active">
  <div class="title-content">
    <h1 class="glitch-text" data-text="PHONICS RESET">PHONICS RESET</h1>
    <p class="subtitle">音が、見える。</p>
    <canvas id="titleWave" width="360" height="80"></canvas>
    <button id="btn-start" class="btn-primary ripple-btn">START</button>
  </div>
</div>

<!-- ==================== WORLD MAP ==================== -->
<div id="screen-map" class="screen">
  <div class="stats-bar">
    <span id="stats-streak">🔥 0</span>
    <span id="stats-level">Lv.1</span>
    <span id="stats-xp">0 XP</span>
  </div>
  <canvas id="mapCanvas"></canvas>
  <div id="world-info" class="world-info hidden">
    <h2 id="world-info-name"></h2>
    <p id="world-info-sub"></p>
    <button id="btn-enter-world" class="btn-primary ripple-btn">入る</button>
    <button id="btn-close-world" class="btn-ghost">戻る</button>
  </div>
</div>

<!-- ==================== STAGE SELECT ==================== -->
<div id="screen-stages" class="screen">
  <div class="stats-bar">
    <button id="btn-back-map" class="btn-ghost">← マップ</button>
    <span id="stages-world-name"></span>
  </div>
  <canvas id="stageWaveCanvas"></canvas>
  <div id="stage-list"></div>
  <div id="stage-progress-bar"><div id="stage-progress-fill"></div></div>
</div>

<!-- ==================== LESSON ==================== -->
<div id="screen-lesson" class="screen">
  <div class="lesson-top">
    <button id="btn-back-stages" class="btn-ghost">✕</button>
    <div id="lesson-progress"><div id="lesson-progress-fill"></div></div>
    <div id="lesson-hearts"></div>
  </div>
  <div id="lesson-area"></div>
</div>

<!-- ==================== STAGE CLEAR ==================== -->
<div id="screen-clear" class="screen">
  <div class="clear-content">
    <h1 class="clear-title">CLEAR!</h1>
    <div id="clear-stars"></div>
    <p id="clear-xp"></p>
    <div class="clear-buttons">
      <button id="btn-next-stage" class="btn-primary ripple-btn">次へ</button>
      <button id="btn-retry-stage" class="btn-ghost">もう一度</button>
    </div>
  </div>
</div>

<!-- ==================== STAGE FAIL ==================== -->
<div id="screen-fail" class="screen">
  <div class="clear-content">
    <h1 class="fail-title">FAILED</h1>
    <p class="fail-sub">ライフがなくなりました</p>
    <button id="btn-retry-fail" class="btn-primary ripple-btn">再挑戦</button>
    <button id="btn-quit-fail" class="btn-ghost">ステージ選択へ</button>
  </div>
</div>

<script src="data/worlds.js"></script>
<script src="app.js"></script>
</body>
</html>
